<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org/">

<head th:fragment="head">
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="../static/css/bootstrap.min.css" th:href="@{/css/bootstrap.min.css}" rel="stylesheet"
        crossorigin="anonymous">

    <!-- Personalized CSS -->
    <link rel="stylesheet" href="../static/css/personal.css" th:href="@{/css/personal.css}">

    <title>Libreria</title>
</head>

<body>

    <!-- Navbar -->
    <nav th:fragment="nav" class="navbar navbar-expand-sm navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">
                <img src="../static/img/EGG.png" th:src="@{/img/EGG.png}" alt="EGG Logo" width="30" height="30"
                    class="d-inline-block align-top">
                <img src="../static/img/Bootstrap_logo.svg" th:src="@{/img/Bootstrap_logo.svg}" alt="Bootstrap 5 Logo"
                    width="30" height="24" class="d-inline-block align-top">
                Library</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#toggleMobileMenu"
                aria-controls="toggleMobileMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="toggleMobileMenu">
                <ul class="navbar-nav ms-auto text-center">
                    <li class="nav-item">
                        <a th:class="${activePage == 'index'} ? 'nav-link active' : 'nav-link'" aria-current="page" th:href="@{/}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a th:class="${activePage == 'bookList'} ? 'nav-link active' : 'nav-link'" th:href="@{/book/listAll}">Books</a>
                    </li>
                    <li class="nav-item">
                        <a th:class="${activePage == 'authorList'} ? 'nav-link active' : 'nav-link'" th:href="@{/author/listAll}">Authors</a>
                    </li>
                    <li class="nav-item">
                        <a th:class="${activePage == 'publisherList'} ? 'nav-link active' : 'nav-link'" th:href="@{/publisher/listAll}">Publishers</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Button trigger modal -->
    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#staticBackdrop">
        Launch static backdrop modal
    </button>

    <!-- Modal -->
    <div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
        aria-labelledby="staticBackdropLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="staticBackdropLabel">Modal title</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    ...
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary">Aceptar</button>
                </div>
            </div>
        </div>
    </div>


    <!-- Bootstrap Bundle with Popper -->
    <script src="../static/js/bootstrap.bundle.min.js" th:src="@{/js/bootstrap.bundle.min.js}"
        integrity="sha384-/bQdsTh/da6pkI1MST/rWKFNjaCP5gBSY4sEBT38Q/9RBh9AH40zEOg7Hlq2THRZ"
        crossorigin="anonymous"></script>
</body>

</html>
